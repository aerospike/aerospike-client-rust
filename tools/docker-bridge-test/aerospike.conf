service {
    cluster-name docker
    proto-fd-max 15000
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }
    heartbeat {
        mode mesh
        address any
        port 3002
        mesh-seed-address-port as-bridge-1 3002
        mesh-seed-address-port as-bridge-2 3002
        mesh-seed-address-port as-bridge-3 3002
        mesh-seed-address-port as-bridge-4 3002
        interval 150
        timeout 10
    }
    fabric {
        address any
        port 3001
    }
}

namespace test {
    replication-factor 2
    storage-engine device {
        file /opt/aerospike/data/test.dat
        filesize 1G
    }
}
